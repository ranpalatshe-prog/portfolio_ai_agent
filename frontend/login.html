<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כניסה לאפליקציה</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      direction: rtl;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      color: #111827;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 28px;
    }

    .muted {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      margin-bottom: 14px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }

    .success-box {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <h1>כניסה לאפליקציה</h1>
      <div class="muted">רק משתמשים מורשים יכולים להיכנס.</div>

      <label for="login-email">אימייל</label>
      <input id="login-email" type="email" placeholder="your@email.com" />

      <label for="login-password">סיסמה</label>
      <input id="login-password" type="password" placeholder="סיסמה" />

      <button type="button" onclick="loginToApp()">התחבר</button>

      <div id="login-message"></div>
    </div>
  </div>
<script src="./config.js"></script>
  <script>
    const API_BASE_URL = window.APP_CONFIG.API_BASE_URL;

     async function loginToApp() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    const response = await fetch(`${API_BASE_URL}/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    function setAuthenticatedUser(token, user) {
      localStorage.setItem("portfolio_auth_token", token);
      localStorage.setItem("portfolio_auth_user", JSON.stringify(user));
    }

    function getAuthToken() {
      return localStorage.getItem("portfolio_auth_token") || "";
    }

    async function validateExistingLogin() {
      const token = getAuthToken();
      if (!token) return;

      try {
        const response = await fetch(`${API_BASE_URL}/me?token=${encodeURIComponent(token)}`);
        const data = await response.json();

        if (response.ok && data.authenticated) {
          window.location.href = "index.html";
        }
      } catch (error) {
        // לא עושים כלום
      }
    }

    async function loginToApp() {
      const email = document.getElementById("login-email")?.value?.trim() || "";
      const password = document.getElementById("login-password")?.value || "";
      const loginMessage = document.getElementById("login-message");

      if (!email || !password) {
        loginMessage.innerHTML = `<div class="error-box">יש להזין אימייל וסיסמה.</div>`;
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "התחברות נכשלה");
        }

        setAuthenticatedUser(data.token, data.user);
        loginMessage.innerHTML = `<div class="success-box">התחברת בהצלחה.</div>`;

        setTimeout(() => {
          window.location.href = "index.html";
        }, 400);
      } catch (error) {
        loginMessage.innerHTML = `<div class="error-box">${error.message}</div>`;
      }
    }

    validateExistingLogin();
    }
  </script>
</body>
</html>
